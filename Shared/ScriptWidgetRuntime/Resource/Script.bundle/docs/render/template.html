<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <script src="marked.min.js"></script>
  <script src="highlight.min.js"></script>
  <script>
    if (typeof hljs !== 'undefined' && typeof hljsDefineJavascript !== 'undefined') {
      hljs.registerLanguage('javascript', hljsDefineJavascript);
      hljs.registerLanguage('jsx', hljsDefineJavascript);
      hljs.registerLanguage('js', hljsDefineJavascript);
    }

    function slugify(text) {
      return text
        .trim()
        .toLowerCase()
        .replace(/`/g, '')
        .replace(/[^\w\u4e00-\u9fa5]+/g, '-')
        .replace(/^-+|-+$/g, '');
    }

    function assignHeadingIds(root) {
      root.querySelectorAll('h1, h2, h3, h4, h5, h6').forEach(function(h) {
        if (!h.id) {
          h.id = slugify(h.textContent);
        }
      });
    }

    function wrapTables(root) {
      root.querySelectorAll('table').forEach(function(table) {
        if (table.parentElement && table.parentElement.classList.contains('table-scroll')) {
          return;
        }
        var wrapper = document.createElement('div');
        wrapper.className = 'table-scroll';
        table.parentNode.insertBefore(wrapper, table);
        wrapper.appendChild(table);
      });
    }

    function scrollToAnchor(anchor) {
      if (!anchor) return;

      var targetId = slugify(anchor);
      var el = document.getElementById(targetId);

      if (!el) {
        var headings = document.querySelectorAll('h1, h2, h3, h4, h5, h6');
        for (var i = 0; i < headings.length; i++) {
          var h = headings[i];
          var text = h.textContent.trim();
          var headingSlug = slugify(text);
          if (
            headingSlug === targetId ||
            headingSlug.indexOf(targetId) === 0 ||
            targetId.indexOf(headingSlug) === 0 ||
            text.indexOf(anchor) !== -1
          ) {
            el = h;
            break;
          }
        }
      }

      if (el) {
        el.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    }

    function renderMarkdown(md, anchor) {
      if (typeof marked === 'undefined') {
        document.getElementById('content').innerHTML = '<p style="color:red">Error: marked.js not loaded</p>';
        return;
      }

      marked.setOptions({
        breaks: true,
        gfm: true
      });

      var content = document.getElementById('content');
      content.innerHTML = marked.parse(md);

      assignHeadingIds(content);
      wrapTables(content);

      if (typeof hljs !== 'undefined') {
        content.querySelectorAll('pre code').forEach(function(block) {
          hljs.highlightElement(block);
        });
      }

      if (anchor) {
        setTimeout(function() {
          scrollToAnchor(anchor);
        }, 100);
      }
    }
  </script>
</head>
<body>
  <div id="content"></div>
</body>
</html>
